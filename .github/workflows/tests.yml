name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dev deps
        run: uv sync --extra dev
      - name: Run tests (L1+L2; L3 excluded - requires Apptainer)
        run: uv run pytest tests/ --ignore=tests/test_e2e_session.py -v
