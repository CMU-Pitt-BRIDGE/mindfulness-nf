<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e" stroke="#16213e" stroke-width="2"/>

  <!-- Brain outline (simplified) -->
  <g transform="translate(64,52)" fill="none" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M-2,-24 C-12,-26 -28,-22 -32,-10 C-36,2 -30,10 -26,14 C-30,16 -32,22 -28,26 C-24,30 -16,30 -10,28 C-8,32 -4,34 -2,32"/>
    <!-- Right hemisphere -->
    <path d="M2,-24 C12,-26 28,-22 32,-10 C36,2 30,10 26,14 C30,16 32,22 28,26 C24,30 16,30 10,28 C8,32 4,34 2,32"/>
    <!-- Center fold -->
    <path d="M0,-24 L0,32" stroke-width="1.5" stroke-dasharray="2,3"/>
    <!-- Gyri details left -->
    <path d="M-16,-16 C-20,-8 -24,-2 -20,6" stroke-width="1.5" opacity="0.6"/>
    <path d="M-8,-4 C-14,4 -18,12 -14,20" stroke-width="1.5" opacity="0.6"/>
    <!-- Gyri details right -->
    <path d="M16,-16 C20,-8 24,-2 20,6" stroke-width="1.5" opacity="0.6"/>
    <path d="M8,-4 C14,4 18,12 14,20" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Signal wave (neurofeedback) -->
  <g transform="translate(0,4)">
    <polyline points="18,98 28,98 34,88 40,108 46,82 52,108 58,90 64,98 70,98 76,88 82,108 88,82 94,108 100,90 110,98"
      fill="none" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="18,98 28,98 34,88 40,108 46,82 52,108 58,90 64,98 70,98 76,88 82,108 88,82 94,108 100,90 110,98"
      fill="none" stroke="#53d8fb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Small dot accents (DMN/CEN network nodes) -->
  <circle cx="44" cy="42" r="3" fill="#e94560" opacity="0.7"/>
  <circle cx="84" cy="42" r="3" fill="#53d8fb" opacity="0.7"/>
  <circle cx="54" cy="58" r="2.5" fill="#e94560" opacity="0.5"/>
  <circle cx="74" cy="58" r="2.5" fill="#53d8fb" opacity="0.5"/>
</svg>
